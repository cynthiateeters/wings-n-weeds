<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- peach circle background -->
  <circle cx="16" cy="16" r="16" fill="hsl(18, 78%, 84%)"/>

  <!-- upper left wing -->
  <path d="M15.5 15 C13 9, 5 7, 5 13 C5 17, 11 18.5, 15.5 17 Z"
        fill="hsl(26, 71%, 58%)" stroke="hsl(67, 11%, 16%)" stroke-width="0.7"/>
  <!-- upper right wing -->
  <path d="M16.5 15 C19 9, 27 7, 27 13 C27 17, 21 18.5, 16.5 17 Z"
        fill="hsl(26, 71%, 58%)" stroke="hsl(67, 11%, 16%)" stroke-width="0.7"/>

  <!-- lower left wing -->
  <path d="M15.5 17 C11 18, 5 21, 7 25 C9 28, 14.5 26, 15.5 21 Z"
        fill="hsl(26, 71%, 58%)" stroke="hsl(67, 11%, 16%)" stroke-width="0.7"/>
  <!-- lower right wing -->
  <path d="M16.5 17 C21 18, 27 21, 25 25 C23 28, 17.5 26, 16.5 21 Z"
        fill="hsl(26, 71%, 58%)" stroke="hsl(67, 11%, 16%)" stroke-width="0.7"/>

  <!-- white spots on upper wings -->
  <circle cx="8"  cy="11" r="1"   fill="white" opacity="0.7"/>
  <circle cx="12" cy="9"  r="0.7" fill="white" opacity="0.7"/>
  <circle cx="24" cy="11" r="1"   fill="white" opacity="0.7"/>
  <circle cx="20" cy="9"  r="0.7" fill="white" opacity="0.7"/>

  <!-- body -->
  <ellipse cx="16" cy="17.5" rx="1.4" ry="5.5" fill="hsl(67, 11%, 16%)"/>

  <!-- head -->
  <circle cx="16" cy="11.5" r="2" fill="hsl(67, 11%, 16%)"/>

  <!-- kawaii eyes -->
  <circle cx="15.1" cy="11.2" r="0.55" fill="white"/>
  <circle cx="16.9" cy="11.2" r="0.55" fill="white"/>
  <circle cx="15.2" cy="11.3" r="0.28" fill="hsl(67, 11%, 16%)"/>
  <circle cx="17.0" cy="11.3" r="0.28" fill="hsl(67, 11%, 16%)"/>

  <!-- antennae -->
  <line x1="15.2" y1="9.5" x2="13" y2="6.5" stroke="hsl(67, 11%, 16%)" stroke-width="0.6" stroke-linecap="round"/>
  <circle cx="12.8" cy="6.2" r="0.8" fill="hsl(67, 11%, 16%)"/>
  <line x1="16.8" y1="9.5" x2="19" y2="6.5" stroke="hsl(67, 11%, 16%)" stroke-width="0.6" stroke-linecap="round"/>
  <circle cx="19.2" cy="6.2" r="0.8" fill="hsl(67, 11%, 16%)"/>
</svg>
